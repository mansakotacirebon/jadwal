<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description"
        content="Dashboard Jadwal Pelajaran - Tampilkan jadwal berdasarkan Hari, Mapel, Guru, dan Kelas." />
    <title>Jadwal Pelajaran TA 2026/2027</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Jadwal" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Custom CSS -->
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-main-top: #ffffff;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
            --warning-color: #eab308;
            --danger-color: #ef4444;
        }

        /* Light Mode */
        [data-theme="light"] {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-dark: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-main-top: #000000;
            --text-muted: #0c131b;
            --border-color: #e2e8f0;
            --accent-color: #0ea5e9;
            --success-color: #16a34a;
            --warning-color: #ca8a04;
            --danger-color: #dc2626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container {
            display: flex;
            height: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-logo {
            width: 80px;
            height: auto;
            object-fit: contain;
        }

        .brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: -0.5px;
            text-align: center;
            line-height: 1.3;
        }

        .filters {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .filter-group label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-color);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            margin-left: 0.5rem;
            min-width: 1.5rem;
        }

        .select-wrapper {
            position: relative;
        }

        select {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
            appearance: none;
            cursor: pointer;
            transition:
                border-color 0.2s,
                box-shadow 0.2s;
        }

        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn-reset {
            width: 100%;
            padding: 0.75rem;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-reset:hover {
            background-color: var(--bg-dark);
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .stats-card {
            margin-top: none;
            background: linear-gradient(135deg,
                    var(--primary-color),
                    var(--primary-hover));
            padding: 1rem;
            border-radius: 0.75rem;
            color: white;
            text-align: center;
        }

        .stats-card h3 {
            font-size: 0.875rem;
            opacity: 0.9;
            margin-bottom: 0.25rem;
        }

        .stats-card p {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            padding: 1rem 1rem;
            background-color: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .top-bar h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-toggle-theme {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-toggle-theme:hover {
            background-color: var(--bg-card);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .search-bar input {
            width: 300px;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-main);
            font-family: inherit;
            transition: width 0.3s ease;
        }

        .search-bar input:focus {
            width: 350px;
            outline: none;
            border-color: var(--primary-color);
        }

        .grid-container {
            flex: none;
            min-height: 0;
            /* Tetap wajib ada */
            max-height: 100vh;
            /* Batas tinggi maksimal */
            padding: 1rem;
            overflow-y: auto;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 0.5rem;
            display: grid;
        }

        /* Menambahkan ruang khusus di paling bawah grid */
        .grid-container::after {
            content: "";
            display: block;
            grid-column: 1 / -1;
            /* Memaksa elemen ini membentang dari kolom pertama sampai akhir */
            height: 100vh;
            /* Atur besarnya jarak bawah yang Anda inginkan di sini */
        }

        /* Schedule Card */
        /* Animation Removed to prevent layout lock */
        .card {
            background-color: var(--bg-card);
            border-radius: 1rem;
            padding: 0.5rem 1.5rem;
            border: 1px solid var(--border-color);
            transition:
                transform 0.2s,
                box-shadow 0.2s;
            position: relative;
            overflow: visible !important;
            display: flex !important;
            flex-direction: column !important;
            height: 100px;
            min-height: 6rem;
            /* Force minimum height to prevent collapse */
        }

        /* ... keep hover ... */

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-color: var(--primary-color);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--accent-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            gap: 1rem;
            flex-shrink: 0;
            /* Prevent header from squishing */
        }

        .card-mapel {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.25rem;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            /* Ensure modern browsers wrap */
        }

        .card-guru {
            font-size: 0.875rem;
            color: var(--text-muted);
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .tag {
            padding: 0.25rem 0.25rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            flex-shrink: 0;
            /* Ensure tag doesn't squish */
        }

        .tag-kelas {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            font-size: 1rem;
            padding: 0.5rem 0.5rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .card-body {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex-grow: 1;
            /* Fill remaining space */
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 0.1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .info-val {
            color: var(--text-main);
            font-weight: 500;
        }

        .card-footer {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: flex-end;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none !important;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
        }

        .empty-state img {
            width: 200px;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
                position: relative;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                width: 280px;
                height: 100vh;
                background-color: var(--bg-card);
                border-right: 1px solid var(--border-color);
                padding: 1.5rem;
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
                overflow-y: auto;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .sidebar::after {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(0, 0, 0, 0.5);
                z-index: -1;
                transition: opacity 0.3s ease;
                opacity: 0;
                pointer-events: none;
            }

            .sidebar.active::after {
                opacity: 1;
                pointer-events: auto;
            }

            .filters {
                flex-direction: column;
                flex: 1;
                overflow-x: auto;
                gap: 1rem;
            }

            .filter-group {
                min-width: 140px;
            }

            .top-bar {
                padding: 0.3rem;
                display: flex;
                gap: 1rem;
                align-items: center;
            }

            .btn-toggle-sidebar {
                background: none;
                border: 1px solid var(--border-color);
                color: var(--text-main);
                font-size: 1.5rem;
                cursor: pointer;
                padding: 0.5rem 0.75rem;
                border-radius: 0.5rem;
                transition: all 0.2s;
                flex-shrink: 0;
            }

            .btn-toggle-sidebar:hover {
                background-color: var(--bg-card);
                border-color: var(--primary-color);
                color: var(--primary-color);
            }

            .top-bar h2 {
                flex: 1;
                font-size: 1.25rem;
                white-space: nowrap;
                color: var(--text-main-top);
            }

            .search-bar input {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>

</head>

<body>
    <div class="app-container">
        <!-- Sidebar / Filter Panel -->
        <aside class="sidebar">
            <div class="brand">
                <img src="logo.svg" alt="Logo MAN 1 Kota Cirebon" class="brand-logo" />
                <h1>MAN 1 Kota Cirebon</h1>
            </div>
            <div class="stats-card">
                <h3>Total Jadwal</h3>
                <p id="total-count">0</p>
            </div>
            <div class="filters">
                <div class="filter-group">
                    <label for="filter-hari">Hari <span class="count-badge" id="count-hari">0</span></label>
                    <div class="select-wrapper">
                        <select id="filter-hari">
                            <option value="">Jumlah Hari</option>
                            <!-- Options populated via JS -->
                        </select>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="filter-kelas">Kelas <span class="count-badge" id="count-kelas">0</span></label>
                    <div class="select-wrapper">
                        <select id="filter-kelas">
                            <option value="">Jumlah Kelas</option>
                        </select>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="filter-mapel">Mata Pelajaran <span class="count-badge" id="count-mapel">0</span></label>
                    <div class="select-wrapper">
                        <select id="filter-mapel">
                            <option value="">Jumlah Mapel</option>
                        </select>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="filter-guru">Guru <span class="count-badge" id="count-guru">0</span></label>
                    <div class="select-wrapper">
                        <select id="filter-guru">
                            <option value="">Jumlah Guru</option>
                        </select>
                    </div>
                </div>

                <button id="reset-filters" class="btn-reset">Reset Filter</button>
            </div>


        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button id="toggle-sidebar" class="btn-toggle-sidebar">🧑‍🏫</button>
                <h2>Jadwal Pelajaran</h2>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Cari jadwal..." />
                    </div>
                    <button id="toggle-theme" class="btn-toggle-theme" title="Toggle Dark/Light Mode">🌙</button>
                </div>
            </header>

            <div id="schedule-grid" class="grid-container">
                <!-- Cards will be injected here -->
            </div>

            <div id="empty-state" class="empty-state hidden">
                <img src="https://cdni.iconscout.com/illustration/premium/thumb/empty-state-2130362-1800926.png"
                    alt="No Data" />
                <p>Tidak ada jadwal yang sesuai filter.</p>
            </div>
        </main>
    </div>

    <!-- Data & Logic -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch((error) => {
                    console.error('Service worker registration failed:', error);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Theme Toggle
            const themeToggleBtn = document.getElementById('toggle-theme');
            const html = document.documentElement;
            const THEME_KEY = 'theme-preference';

            // Clear app-specific session/cache storage when browser/tab closes
            function clearAppStorage() {
                try {
                    sessionStorage.removeItem(THEME_KEY);

                    if (window.caches && window.caches.keys) {
                        caches.keys().then((cacheNames) => {
                            cacheNames.forEach((cacheName) => caches.delete(cacheName));
                        });
                    }
                } catch (error) {
                    console.warn('Tidak dapat membersihkan cache secara penuh:', error);
                }
            }

            window.addEventListener('beforeunload', clearAppStorage);
            window.addEventListener('unload', clearAppStorage);

            // Initialize theme
            function initTheme() {
                const savedTheme = sessionStorage.getItem(THEME_KEY);
                let currentTheme = savedTheme;

                // If no saved theme, check system preference
                if (!currentTheme) {
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    currentTheme = prefersDark ? 'dark' : 'light';
                }

                applyTheme(currentTheme);
            }

            // Apply theme
            function applyTheme(theme) {
                if (theme === 'light') {
                    html.setAttribute('data-theme', 'light');
                    themeToggleBtn.textContent = '🌙';
                    themeToggleBtn.title = 'Switch to Dark Mode';
                } else {
                    html.removeAttribute('data-theme');
                    themeToggleBtn.textContent = '☀️';
                    themeToggleBtn.title = 'Switch to Light Mode';
                }
                sessionStorage.setItem(THEME_KEY, theme);
            }

            // Toggle theme
            function toggleTheme() {
                const currentTheme = html.getAttribute('data-theme') || 'dark';
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                applyTheme(newTheme);
            }

            // Theme toggle event listener
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', toggleTheme);
            }

            // Initialize theme on page load
            initTheme();

            // Mobile Sidebar Toggle
            const sidebar = document.querySelector('.sidebar');
            const toggleBtn = document.getElementById('toggle-sidebar');

            // Helper function to close sidebar
            function closeSidebar() {
                sidebar.classList.remove('active');
                toggleBtn.classList.remove('hidden');
            }

            // Toggle sidebar visibility
            if (toggleBtn && sidebar) {
                toggleBtn.addEventListener('click', () => {
                    sidebar.classList.toggle('active');
                    toggleBtn.classList.toggle('hidden');
                });

                // Close sidebar when clicking outside
                document.addEventListener('click', (e) => {
                    // Check if sidebar is open
                    if (sidebar.classList.contains('active')) {
                        // If click is outside sidebar and not on toggle button
                        if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
                            closeSidebar();
                        }
                    }
                });

                // Close sidebar with ESC key
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && sidebar.classList.contains('active')) {
                        closeSidebar();
                    }
                });

                // Close sidebar when window resizes to desktop size
                window.addEventListener('resize', () => {
                    if (window.innerWidth > 768) {
                        closeSidebar();
                    }
                });
            }


            // Check if data is loaded
            if (typeof dataJadwal === 'undefined') {
                console.error('Data jadwal tidak ditemukan. Pastikan datajadwal.js dimuat.');
                return;
            }

            // State
            const state = {
                data: dataJadwal,
                filters: {
                    hari: '',
                    kelas: '10 K',
                    mapel: '',
                    guru: '',
                    search: ''
                }
            };

            // DOM Elements
            const elements = {
                grid: document.getElementById('schedule-grid'),
                emptyState: document.getElementById('empty-state'),
                totalCount: document.getElementById('total-count'),
                inputs: {
                    hari: document.getElementById('filter-hari'),
                    kelas: document.getElementById('filter-kelas'),
                    mapel: document.getElementById('filter-mapel'),
                    guru: document.getElementById('filter-guru'),
                    search: document.getElementById('search-input')
                },
                counts: {
                    hari: document.getElementById('count-hari'),
                    kelas: document.getElementById('count-kelas'),
                    mapel: document.getElementById('count-mapel'),
                    guru: document.getElementById('count-guru')
                },
                resetBtn: document.getElementById('reset-filters')
            };

            // Initialize
            function init() {
                // Set hari filter to current day
                const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
                const currentDay = days[new Date().getDay()];
                state.filters.hari = currentDay;
                state.filters.kelas = '10 K';

                updateDropdowns(); // Initial population
                applyFilters(); // Apply initial filter for current day
                setupEventListeners();
            }

            /**
             * Get valid options for a specific key based on OTHER current filters.
             * Use this to implement dependent dropdowns.
             */
            function getValidOptions(targetKey) {
                // Filter the main data using all active filters EXCEPT the targetKey itself.
                // This ensures that selecting 'Senin' doesn't hide 'Senin' from the Hari dropdown,
                // but it DOES hide 'Classes' that don't have schedules on 'Senin'.
                const filteredData = state.data.filter(item => {
                    const matchesHari = targetKey === 'hari' || !state.filters.hari || item.hari === state.filters.hari;
                    const matchesKelas = targetKey === 'kelas' || !state.filters.kelas || item.kelas === state.filters.kelas;
                    const matchesMapel = targetKey === 'mapel' || !state.filters.mapel || item.mapel === state.filters.mapel;
                    const matchesGuru = targetKey === 'guru' || !state.filters.guru || item.guru === state.filters.guru;

                    // We do NOT use search text to filter dropdown options, only the grid.
                    return matchesHari && matchesKelas && matchesMapel && matchesGuru;
                });

                const uniqueValues = [...new Set(filteredData.map(item => item[targetKey]))];

                if (targetKey === 'hari') {
                    return uniqueValues.sort((a, b) => b.localeCompare(a, 'id'));
                }

                return uniqueValues.sort();
            }

            // Update all dropdowns options based on current state
            function updateDropdowns() {
                const keys = ['hari', 'kelas', 'mapel', 'guru'];

                // Default placeholder texts
                const defaultLabels = {
                    hari: 'Jumlah Hari',
                    kelas: 'Jumlah Kelas',
                    mapel: 'Jumlah Mapel',
                    guru: 'Jumlah Guru'
                };

                keys.forEach(key => {
                    const select = elements.inputs[key];
                    const validValues = getValidOptions(key);
                    const currentValue = state.filters[key];

                    // 1. Clear existing options
                    select.innerHTML = '';

                    // 2. Add Default Option
                    const defaultOption = document.createElement('option');
                    defaultOption.value = '';
                    defaultOption.textContent = defaultLabels[key];
                    select.appendChild(defaultOption);

                    // 3. Add Valid Options
                    validValues.forEach(val => {
                        const option = document.createElement('option');
                        option.value = val;
                        option.textContent = val;
                        select.appendChild(option);
                    });

                    // 4. Restore Selection or Reset
                    // If the previously selected value is still valid in the new context, keep it.
                    if (currentValue && validValues.includes(currentValue)) {
                        select.value = currentValue;
                    } else if (currentValue) {
                        // If the selected value is no longer valid (e.g. that Teacher doesn't teach on the new Day),
                        // we must deselect it to reflect reality.
                        state.filters[key] = '';
                        select.value = '';
                        // Since we changed the state 'silently' here, we should technically re-filter the grid.
                        // applyFilters will be called by the event listener that triggered this update, 
                        // but if we are in a chain reaction, we might need to ensure consistency.
                        // However, applyFilters uses state.filters, so updating state.filters[key] here is correct.
                    }
                });

                // Update count badges
                updateCountBadges();
            }

            // Update count badges for each filter
            function updateCountBadges() {
                const keys = ['hari', 'kelas', 'mapel', 'guru'];

                keys.forEach(key => {
                    const validValues = getValidOptions(key);
                    const count = validValues.length;
                    if (elements.counts[key]) {
                        elements.counts[key].textContent = count;
                    }
                });
            }

            // Filter Logic for GRID
            function applyFilters() {
                const filtered = state.data.filter(item => {
                    const matchesHari = !state.filters.hari || item.hari === state.filters.hari;
                    const matchesKelas = !state.filters.kelas || item.kelas === state.filters.kelas;
                    const matchesMapel = !state.filters.mapel || item.mapel === state.filters.mapel;
                    const matchesGuru = !state.filters.guru || item.guru === state.filters.guru;

                    const searchTerm = state.filters.search.toLowerCase();
                    const matchesSearch = !searchTerm ||
                        item.mapel.toLowerCase().includes(searchTerm) ||
                        item.guru.toLowerCase().includes(searchTerm) ||
                        item.kelas.toLowerCase().includes(searchTerm);

                    return matchesHari && matchesKelas && matchesMapel && matchesGuru && matchesSearch;
                });

                renderCards(filtered);
            }

            // Render Cards
            function renderCards(data) {
                elements.grid.innerHTML = '';
                elements.totalCount.textContent = data.length;

                if (data.length === 0) {
                    elements.emptyState.classList.remove('hidden');
                    return;
                }

                elements.emptyState.classList.add('hidden');

                // Limit rendering for performance if needed, but 1600 is okay for modern browsers.
                // Adding a simple max cap for initial render could be good if it's too slow, but let's stick to full render for now.

                data.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    // Stagger animation with a cap to prevent 5-second delays on the last items
                    const delay = Math.min(index * 30, 1000);
                    card.style.animationDelay = `${delay}ms`;

                    card.innerHTML = `
                <div class="card-header">
                    <div>
                        <h3 class="card-mapel">${item.mapel}</h3>
                        <p class="card-guru">${item.guru}</p>
                    </div>
                    <span class="tag tag-kelas">${item.kelas}</span>
                </div>
                <div class="card-body">
                    <div class="info-row">
                        <span>🗓️</span>
                        <span class="info-val">${item.hari}</span>
                     <span>  ||</span>
                        <span>⏰</span>
                        <span class="info-val">${item.jam}</span>
                    </div>
                </div>
            `;
                    elements.grid.appendChild(card);
                });
            }

            // Event Listeners
            function setupEventListeners() {
                const handleFilterChange = (key) => (e) => {
                    state.filters[key] = e.target.value;
                    // 1. Update dependent dropdowns based on the new change
                    updateDropdowns();
                    // 2. Filter the grid
                    applyFilters();
                };

                elements.inputs.hari.addEventListener('change', handleFilterChange('hari'));
                elements.inputs.kelas.addEventListener('change', handleFilterChange('kelas'));
                elements.inputs.mapel.addEventListener('change', handleFilterChange('mapel'));
                elements.inputs.guru.addEventListener('change', handleFilterChange('guru'));

                elements.inputs.search.addEventListener('input', (e) => {
                    state.filters.search = e.target.value;
                    applyFilters();
                });

                elements.resetBtn.addEventListener('click', () => {
                    state.filters = {
                        hari: '',
                        kelas: '',
                        mapel: '',
                        guru: '',
                        search: state.filters.search // Keep search text? User usually expects full reset.
                    };

                    // To be thorough, you might want to clear search too if it's a "Reset All" button.
                    state.filters.search = '';
                    elements.inputs.search.value = '';

                    updateDropdowns(); // Reset options to full lists
                    applyFilters();
                });
            }

            init();
        });
